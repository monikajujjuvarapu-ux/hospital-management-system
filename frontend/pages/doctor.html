<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctor Management</title>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>

<div class="patient-page">

    <!-- LEFT SIDE: VIEW DOCTORS -->
    <div class="right-section" style="order:1">

        <h1>Doctor Records</h1>

        <table id="doctorTable">

            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Specialization</th>
                    <th>Phone</th>
                    <th>Email</th>
                </tr>
            </thead>

            <tbody></tbody>

        </table>

    </div>

    <!-- RIGHT SIDE: ADD DOCTOR -->
    <div class="left-section" style="order:2">

        <form id="doctorForm">

            <h1>Add Doctor</h1>

            <input type="hidden" id="doctorId">

            <input type="text" id="doctorName" placeholder="Doctor Name" required>

            <input type="text" id="specialization" placeholder="Specialization" required>

            <input type="text" id="doctorPhone" placeholder="Phone" required>

            <input type="text" id="doctorEmail" placeholder="Email" required>

            <button type="submit">Save Doctor</button>

        </form>

    </div>

</div>

<script>

const api = "http://localhost:5000/api/Doctor";
const form = document.getElementById("doctorForm");

// LOAD DOCTORS
async function loadDoctors()
{
    const res = await fetch(`${api}/all`);
    const data = await res.json();

    let rows = "";

    data.forEach(d => {
        rows += `
        <tr>
            <td>${d.doctorId}</td>
            <td>${d.doctorName}</td>
            <td>${d.specialization}</td>
            <td>${d.phone}</td>
            <td>${d.email}</td>
        </tr>`;
    });

    document.querySelector("#doctorTable tbody").innerHTML = rows;
}

loadDoctors();

// ADD DOCTOR
form.addEventListener("submit", async function(e)
{
    e.preventDefault();

    const doctor = {
        doctorName: document.getElementById("doctorName").value,
        specialization: document.getElementById("specialization").value,
        phone: document.getElementById("doctorPhone").value,
        email: document.getElementById("doctorEmail").value
    };

    const res = await fetch(`${api}/add`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(doctor)
    });

    if(res.ok)
    {
        alert("Doctor Added");
        form.reset();
        loadDoctors();
    }
    else
    {
        alert("Failed");
    }
});

</script>

</body>
</html>
