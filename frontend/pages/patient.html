<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Patient Management</title>

    <link rel="stylesheet" href="../css/style.css">

</head>

<body>

<div class="patient-page">

    <!-- LEFT SIDE: VIEW PATIENTS -->
    <div class="right-section">

        <h1>Patient Records</h1>

        <table id="patientTable">

            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Age</th>
                    <th>Gender</th>
                    <th>Phone</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>

            <tbody></tbody>

        </table>

    </div>

    <!-- RIGHT SIDE: ADD PATIENT -->
    <div class="left-section">

        <form id="patientForm">

            <h1>Add Patient</h1>

            <input type="hidden" id="patientId">

            <input type="text" id="name" placeholder="Patient Name" required>

            <input type="number" id="age" placeholder="Age" required>

            <select id="gender" required>
                <option value="">Select Gender</option>
                <option value="Male">Male</option>
                <option value="Female">Female</option>
                <option value="Other">Other</option>
            </select>

            <input type="text" id="phone" placeholder="Phone" required>

            <input type="text" id="address" placeholder="Address" required>

            <select id="status" required>
                <option value="">Select Status</option>
                <option value="Admitted">Admitted</option>
                <option value="Under Treatment">Under Treatment</option>
                <option value="Discharged">Discharged</option>
                <option value="OP Visit">OP Visit</option>
            </select>

            <button type="submit">Save Patient</button>

        </form>

    </div>

</div>

<script>

const api = "http://localhost:5000/api/Patient";
const form = document.getElementById("patientForm");

// LOAD PATIENTS
async function loadPatients()
{
    const res = await fetch(`${api}/all`);
    const data = await res.json();

    let rows = "";

    data.forEach(p => {
        rows += `
        <tr>
            <td>${p.patientId}</td>
            <td>${p.name}</td>
            <td>${p.age}</td>
            <td>${p.gender}</td>
            <td>${p.phone}</td>
            <td>${p.status}</td>
            <td>
                <button onclick="editPatient(
                    ${p.patientId},
                    '${p.name}',
                    ${p.age},
                    '${p.gender}',
                    '${p.phone}',
                    '${p.address}',
                    '${p.status}'
                )">Edit</button>

                <button onclick="deletePatient(${p.patientId})">Delete</button>
            </td>
        </tr>`;
    });

    document.querySelector("#patientTable tbody").innerHTML = rows;
}

loadPatients();

// ADD / UPDATE PATIENT
form.addEventListener("submit", async function(e)
{
    e.preventDefault();

    const id = document.getElementById("patientId").value;

    const patient = {
        patientId: id ? parseInt(id) : 0,
        name: document.getElementById("name").value,
        age: parseInt(document.getElementById("age").value),
        gender: document.getElementById("gender").value,
        phone: document.getElementById("phone").value,
        address: document.getElementById("address").value,
        status: document.getElementById("status").value
    };

    let url = `${api}/add`;
    let method = "POST";

    if(id)
    {
        url = `${api}/update/${id}`;
        method = "PUT";
    }

    const res = await fetch(url, {
        method: method,
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(patient)
    });

    if(res.ok)
    {
        alert("Success");
        form.reset();
        document.getElementById("patientId").value = "";
        loadPatients();
    }
    else
    {
        alert("Failed");
    }
});

// EDIT
function editPatient(id, name, age, gender, phone, address, status)
{
    document.getElementById("patientId").value = id;
    document.getElementById("name").value = name;
    document.getElementById("age").value = age;
    document.getElementById("gender").value = gender;
    document.getElementById("phone").value = phone;
    document.getElementById("address").value = address;
    document.getElementById("status").value = status;
}

// DELETE
async function deletePatient(id)
{
    const res = await fetch(`${api}/delete/${id}`, {
        method: "DELETE"
    });

    if(res.ok)
    {
        alert("Deleted");
        loadPatients();
    }
}

</script>

</body>
</html>
